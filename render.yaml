# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hyperliquid-trading-sim-api
    env: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    healthCheckPath: /health
